<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>imbs008 Class Chatbot 🙏</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600&family=Lora:ital,wght@0,400;0,600;1,400&family=Noto+Sans+SC:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #c9a84c;
    --gold-light: #e8d5a3;
    --gold-pale: #fdf8ee;
    --brown-dark: #3b2a1a;
    --brown-mid: #6b4c2a;
    --brown-light: #a07850;
    --red-lotus: #c0392b;
    --green-leaf: #5a7a4a;
    --cream: #faf6f0;
    --white: #ffffff;
    --shadow: rgba(59,42,26,0.13);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Lora', 'Noto Serif SC', serif;
    background: var(--cream);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background-image:
      radial-gradient(ellipse at 10% 20%, rgba(201,168,76,0.10) 0%, transparent 60%),
      radial-gradient(ellipse at 90% 80%, rgba(90,122,74,0.08) 0%, transparent 60%),
      url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23c9a84c' fill-opacity='0.04'%3E%3Cpath d='M30 0 L35 25 L60 30 L35 35 L30 60 L25 35 L0 30 L25 25 Z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
  }

  .page-wrap {
    width: 100%;
    max-width: 700px;
    padding: 20px 16px 40px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* Header */
  .header {
    text-align: center;
    margin-bottom: 24px;
    animation: fadeDown 0.7s ease both;
  }

  .lotus-icon {
    margin-bottom: 6px;
    display: block;
  }

  .lotus-icon img {
    width: 90px;
    height: auto;
    filter: drop-shadow(0 2px 8px rgba(90,122,74,0.35));
  }

  .header h1 {
    font-family: 'Lora', serif;
    font-size: 1.6rem;
    color: var(--brown-dark);
    letter-spacing: 0.03em;
    font-weight: 600;
  }

  .header h1 span {
    color: var(--gold);
  }

  .header p {
    font-family: 'Noto Sans SC', sans-serif;
    font-size: 0.82rem;
    color: var(--brown-light);
    margin-top: 4px;
    letter-spacing: 0.04em;
  }

  .lang-bar {
    display: flex;
    gap: 8px;
    justify-content: center;
    margin-top: 10px;
    flex-wrap: wrap;
  }

  .lang-btn {
    font-family: 'Noto Sans SC', sans-serif;
    font-size: 0.72rem;
    padding: 3px 12px;
    border-radius: 20px;
    border: 1px solid var(--gold-light);
    background: transparent;
    color: var(--brown-mid);
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.04em;
  }

  .lang-btn.active, .lang-btn:hover {
    background: var(--gold);
    color: var(--white);
    border-color: var(--gold);
  }

  /* Chat window */
  .chat-window {
    width: 100%;
    background: var(--white);
    border-radius: 18px;
    box-shadow: 0 8px 40px var(--shadow), 0 1px 0 rgba(201,168,76,0.2) inset;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    animation: fadeUp 0.7s 0.15s ease both;
    border: 1px solid rgba(201,168,76,0.18);
    min-height: 500px;
    max-height: 70vh;
  }

  .chat-title-bar {
    background: linear-gradient(135deg, var(--brown-dark) 0%, var(--brown-mid) 100%);
    padding: 14px 20px;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .status-dot {
    width: 9px; height: 9px;
    background: #7bed9f;
    border-radius: 50%;
    box-shadow: 0 0 0 2px rgba(123,237,159,0.3);
    animation: pulse 2s infinite;
  }

  .chat-title-bar-text {
    flex: 1;
  }

  .chat-title-bar-text strong {
    font-family: 'Lora', serif;
    color: var(--gold-light);
    font-size: 0.95rem;
    display: block;
  }

  .chat-title-bar-text span {
    font-family: 'Noto Sans SC', sans-serif;
    color: rgba(255,255,255,0.55);
    font-size: 0.72rem;
  }

  .chat-messages {
    flex: 1;
    overflow-y: auto;
    padding: 20px 18px;
    display: flex;
    flex-direction: column;
    gap: 14px;
    scroll-behavior: smooth;
  }

  .chat-messages::-webkit-scrollbar { width: 4px; }
  .chat-messages::-webkit-scrollbar-track { background: transparent; }
  .chat-messages::-webkit-scrollbar-thumb { background: var(--gold-light); border-radius: 4px; }

  .msg {
    display: flex;
    gap: 10px;
    align-items: flex-end;
    animation: msgIn 0.35s ease both;
  }

  .msg.user { flex-direction: row-reverse; }

  .avatar {
    width: 32px; height: 32px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 1rem;
    flex-shrink: 0;
  }

  .msg.bot .avatar { background: linear-gradient(135deg, var(--gold) 0%, var(--brown-mid) 100%); }
  .msg.user .avatar { background: linear-gradient(135deg, var(--green-leaf) 0%, #3d5c30 100%); color: white; font-size: 0.8rem; font-family: 'Noto Sans SC', sans-serif; }

  .bubble {
    max-width: 75%;
    padding: 12px 16px;
    border-radius: 16px;
    font-size: 0.9rem;
    line-height: 1.65;
    font-family: 'Noto Sans SC', 'Lora', sans-serif;
  }

  .msg.bot .bubble {
    background: var(--gold-pale);
    color: var(--brown-dark);
    border-bottom-left-radius: 4px;
    border: 1px solid rgba(201,168,76,0.18);
  }

  .msg.user .bubble {
    background: linear-gradient(135deg, var(--brown-dark), var(--brown-mid));
    color: var(--white);
    border-bottom-right-radius: 4px;
  }

  .bubble-time {
    font-size: 0.65rem;
    color: var(--brown-light);
    margin-top: 4px;
    font-family: 'Noto Sans SC', sans-serif;
    opacity: 0.7;
    text-align: right;
  }

  .msg.user .bubble-time { text-align: left; }

  /* Typing indicator */
  .typing-indicator {
    display: flex;
    gap: 5px;
    padding: 14px 16px;
    align-items: center;
  }

  .typing-dot {
    width: 7px; height: 7px;
    background: var(--gold);
    border-radius: 50%;
    animation: typingBounce 1.2s infinite;
  }
  .typing-dot:nth-child(2) { animation-delay: 0.2s; }
  .typing-dot:nth-child(3) { animation-delay: 0.4s; }

  /* Quick replies */
  .quick-replies {
    padding: 6px 18px 10px;
    display: flex;
    flex-wrap: wrap;
    gap: 7px;
  }

  .qr-btn {
    font-family: 'Noto Sans SC', sans-serif;
    font-size: 0.76rem;
    padding: 5px 13px;
    border-radius: 20px;
    border: 1px solid var(--gold-light);
    background: var(--gold-pale);
    color: var(--brown-mid);
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }

  .qr-btn:hover {
    background: var(--gold);
    color: var(--white);
    border-color: var(--gold);
    transform: translateY(-1px);
  }

  /* Input area */
  .input-area {
    border-top: 1px solid rgba(201,168,76,0.15);
    padding: 12px 16px;
    display: flex;
    gap: 10px;
    align-items: flex-end;
    background: var(--white);
  }

  .input-area textarea {
    flex: 1;
    border: 1px solid rgba(201,168,76,0.3);
    border-radius: 12px;
    padding: 10px 14px;
    font-family: 'Noto Sans SC', sans-serif;
    font-size: 0.88rem;
    color: var(--brown-dark);
    background: var(--gold-pale);
    resize: none;
    outline: none;
    transition: border-color 0.2s;
    min-height: 42px;
    max-height: 100px;
    line-height: 1.5;
  }

  .input-area textarea:focus {
    border-color: var(--gold);
    box-shadow: 0 0 0 3px rgba(201,168,76,0.12);
  }

  .input-area textarea::placeholder { color: var(--brown-light); opacity: 0.7; }

  .send-btn {
    width: 42px; height: 42px;
    border-radius: 12px;
    background: linear-gradient(135deg, var(--gold) 0%, var(--brown-mid) 100%);
    border: none;
    color: white;
    font-size: 1.1rem;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: transform 0.15s, box-shadow 0.15s;
    flex-shrink: 0;
    box-shadow: 0 3px 10px rgba(201,168,76,0.35);
  }

  .send-btn:hover { transform: scale(1.07); box-shadow: 0 5px 16px rgba(201,168,76,0.45); }
  .send-btn:active { transform: scale(0.96); }
  .send-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

  /* Footer */
  .footer-note {
    margin-top: 14px;
    font-family: 'Noto Sans SC', sans-serif;
    font-size: 0.7rem;
    color: var(--brown-light);
    text-align: center;
    opacity: 0.75;
    animation: fadeUp 0.7s 0.3s ease both;
  }

  .footer-note a { color: var(--gold); text-decoration: none; }

  /* Animations */
  @keyframes fadeDown { from { opacity:0; transform: translateY(-18px); } to { opacity:1; transform: none; } }
  @keyframes fadeUp   { from { opacity:0; transform: translateY(18px);  } to { opacity:1; transform: none; } }
  @keyframes msgIn    { from { opacity:0; transform: scale(0.95) translateY(6px); } to { opacity:1; transform: none; } }
  @keyframes pulse    { 0%,100%{ box-shadow: 0 0 0 2px rgba(123,237,159,0.3); } 50%{ box-shadow: 0 0 0 5px rgba(123,237,159,0.15); } }
  @keyframes typingBounce { 0%,60%,100%{ transform: translateY(0); } 30%{ transform: translateY(-7px); } }

  @media (max-width: 500px) {
    .header h1 { font-size: 1.25rem; }
    .bubble { max-width: 88%; font-size: 0.84rem; }
    .chat-window { max-height: 75vh; }
  }
</style>
</head>

const QUICK_REPLIES = {
  en: ["📅 2026 Events", "🙏 What is Dharma?", "🏛️ About TMBS", "🪷 About imbs008", "✈️ Thailand Trip"],
  'zh-s': ["📅 2026年活动", "🙏 什么是佛法?", "🏛️ 关于慧嚴佛學會", "🪷 关于imbs008", "✈️ 泰国之旅"],
  'zh-t': ["📅 2026年活動", "🙏 什麼是佛法?", "🏛️ 關於慧嚴佛學會", "🪷 關於imbs008", "✈️ 泰國之旅"]
};

const WELCOME_MSG = {
  en: "🙏 Welcome to the imbs008 Class Assistant!\n\nI can help you with:\n• Class events & 2026 schedule\n• Buddhist teachings & Dharma\n• Info about TMBS & our class\n\nHow may I assist you today?",
  'zh-s': "🙏 欢迎来到imbs008班级助手！\n\n我可以帮您了解：\n• 班级活动与2026年课程安排\n• 佛法教义与佛教智慧\n• 慧嚴佛學會与班级简介\n\n请问有什么可以帮到您？",
  'zh-t': "🙏 歡迎來到imbs008班級助手！\n\n我可以幫您了解：\n• 班級活動與2026年課程安排\n• 佛法教義與佛教智慧\n• 慧嚴佛學會與班級簡介\n\n請問有什麼可以幫到您？"
};

const SUBTITLES = {
  en: "Online · Ready to help",
  'zh-s': "在线 · 随时为您服务",
  'zh-t': "在線 · 隨時為您服務"
};

let currentLang = 'en';
let conversationHistory = [];
let isTyping = false;

function setLang(lang) {
  currentLang = lang;
  document.querySelectorAll('.lang-btn').forEach((b,i) => {
    b.classList.toggle('active', ['en','zh-s','zh-t'][i] === lang);
  });
  document.getElementById('subtitle').textContent = SUBTITLES[lang];
  document.getElementById('userInput').placeholder =
    lang === 'en' ? "Ask about events, Dharma teachings..." :
    lang === 'zh-s' ? "询问活动、佛法教义..." : "詢問活動、佛法教義...";
  // Reset chat with new language welcome
  conversationHistory = [];
  document.getElementById('chatMessages').innerHTML = '';
  addBotMessage(WELCOME_MSG[lang]);
  renderQuickReplies();
}

function renderQuickReplies() {
  const container = document.getElementById('quickReplies');
  container.innerHTML = '';
  QUICK_REPLIES[currentLang].forEach(q => {
    const btn = document.createElement('button');
    btn.className = 'qr-btn';
    btn.textContent = q;
    btn.onclick = () => { sendText(q); };
    container.appendChild(btn);
  });
}

function getTime() {
  return new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
}

function addBotMessage(text) {
  const msgs = document.getElementById('chatMessages');
  const div = document.createElement('div');
  div.className = 'msg bot';
  div.innerHTML = `
    <div class="avatar">🪷</div>
    <div>
      <div class="bubble">${text.replace(/\n/g,'<br>')}</div>
      <div class="bubble-time">${getTime()}</div>
    </div>`;
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}

function addUserMessage(text) {
  const msgs = document.getElementById('chatMessages');
  const div = document.createElement('div');
  div.className = 'msg user';
  div.innerHTML = `
    <div class="avatar">你</div>
    <div>
      <div class="bubble">${text.replace(/</g,'&lt;')}</div>
      <div class="bubble-time">${getTime()}</div>
    </div>`;
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}

function showTyping() {
  const msgs = document.getElementById('chatMessages');
  const div = document.createElement('div');
  div.className = 'msg bot';
  div.id = 'typingIndicator';
  div.innerHTML = `
    <div class="avatar">🪷</div>
    <div class="bubble" style="padding:14px 16px;">
      <div class="typing-indicator">
        <div class="typing-dot"></div>
        <div class="typing-dot"></div>
        <div class="typing-dot"></div>
      </div>
    </div>`;
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}

function removeTyping() {
  const t = document.getElementById('typingIndicator');
  if (t) t.remove();
}

async function sendText(text) {
  if (isTyping || !text.trim()) return;
  addUserMessage(text);
  conversationHistory.push({ role: 'user', content: text });
  await getResponse();
}

async function sendMessage() {
  const input = document.getElementById('userInput');
  const text = input.value.trim();
  if (!text || isTyping) return;
  input.value = '';
  autoResize(input);
  await sendText(text);
}

async function getResponse() {
  isTyping = true;
  document.getElementById('sendBtn').disabled = true;
  document.getElementById('quickReplies').style.opacity = '0.4';
  showTyping();

  try {
    const response = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-20250514",
        max_tokens: 1000,
        system: SYSTEM_PROMPTS[currentLang],
        messages: conversationHistory
      })
    });

    const data = await response.json();
    const reply = data.content?.map(b => b.text || '').join('') || "I'm sorry, I couldn't process that. Please try again.";

    removeTyping();
    addBotMessage(reply);
    conversationHistory.push({ role: 'assistant', content: reply });

  } catch (e) {
    removeTyping();
    const errMsg = currentLang === 'en'
      ? "Sorry, I couldn't connect. Please check your internet and try again. 🙏"
      : currentLang === 'zh-s'
      ? "抱歉，连接出现问题。请检查网络后再试。🙏"
      : "抱歉，連接出現問題。請檢查網絡後再試。🙏";
    addBotMessage(errMsg);
  }

  isTyping = false;
  document.getElementById('sendBtn').disabled = false;
  document.getElementById('quickReplies').style.opacity = '1';
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 100) + 'px';
}

// Init
addBotMessage(WELCOME_MSG[currentLang]);
renderQuickReplies();
</script>
</body>
</html>
